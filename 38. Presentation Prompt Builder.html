<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Presentation Prompt Builder</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #e8e8f8;
  padding: 40px 20px;
  color: #2d2d5e;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 25px;
}

.badge {
  display: inline-block;
  background: #7c3aed;
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 34px;
  color: #5b21b6;
  font-weight: 800;
}

.header p {
  font-size: 14px;
  color: #6b7280;
}

.info {
  margin-top: 8px;
  font-size: 13px;
  color: #4b5563;
}

/* CARD */
.card {
  background: white;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 22px;
  max-width: 900px;
  margin: 0 auto 18px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #7c3aed;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* INPUT */
textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid #ddd8f5;
  background: #fafafa;
  font-family: monospace;
}

/* BUTTONS */
.btn {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: #5b21b6;
  color: white;
}

.secondary {
  background: transparent;
  border: 1.5px solid #c4b5fd;
  color: #5b21b6;
}

/* OUTPUT */
.output {
  background: #fff;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 18px;
  min-height: 200px;
  white-space: pre-wrap;
}

.slide {
  background: #f5f3ff;
  border-left: 4px solid #7c3aed;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.title {
  background: #ede9fe;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  font-weight: 700;
}

/* GRID */
.row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* HISTORY */
.history-item {
  background: #f5f3ff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="badge">🎤 Presentation Builder</div>
  <h1>Presentation Prompt Generator</h1>

  <div class="info">
      Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
  </div>
</div>

<!-- TOP INPUT -->
<div class="card">
  <div class="section-label">Presentation Topic</div>
  <textarea id="topic" rows="3"
  placeholder="e.g. Climate Change"></textarea>
</div>

<!-- SETTINGS -->
<div class="card">
  <div class="section-label">Presentation Settings</div>

  <div class="row">
    <select id="slides">
      <option>5 Slides</option>
      <option>7 Slides</option>
      <option>10 Slides</option>
    </select>

    <select id="style">
      <option>Formal</option>
      <option>Creative</option>
      <option>Educational</option>
    </select>
  </div>

  <br>

  <button class="btn primary" onclick="generate()">Generate Presentation</button>
  <button class="btn secondary" onclick="clearAll()">Clear</button>
</div>

<!-- OUTPUT -->
<div class="card">
  <div class="section-label">Generated Presentation</div>
  <div class="output" id="output">
    Your presentation structure will appear here...
  </div>
</div>

<!-- HISTORY -->
<div class="card">
  <div class="section-label">History</div>
  <div id="history"></div>
</div>

<script>
let history = [];

function generate() {
  const topic = document.getElementById("topic").value;
  const slides = document.getElementById("slides").value;
  const style = document.getElementById("style").value;

  if (!topic) return alert("Enter a topic!");

  const result = buildPresentation(topic, slides, style);

  render(result);
  save(topic, result);
}

function buildPresentation(topic, slides, style) {

  let baseSlides = `
PRESENTATION TOPIC: ${topic}
STYLE: ${style}
TOTAL SLIDES: ${slides}

----------------------------------
SLIDE STRUCTURE
----------------------------------

SLIDE 1: Title Slide
- ${topic}
- Presenter Introduction

SLIDE 2: Introduction
- What is ${topic}?
- Why it matters

SLIDE 3: Background
- History of ${topic}
- Key developments

SLIDE 4: Main Concepts
- Core ideas
- Important terms

SLIDE 5: Examples
- Real world applications
- Case studies
`;

  if (slides === "7 Slides" || slides === "10 Slides") {
    baseSlides += `

SLIDE 6: Advantages & Disadvantages
- Pros and cons

SLIDE 7: Impact
- How it affects society
`;
  }

  if (slides === "10 Slides") {
    baseSlides += `

SLIDE 8: Challenges
- Problems and limitations

SLIDE 9: Future Scope
- Future developments

SLIDE 10: Conclusion
- Summary of presentation
`;
  }

  baseSlides += `

----------------------------------
SPEAKER NOTES
----------------------------------
Explain each slide clearly and use simple examples.
Maintain ${style.toLowerCase()} tone during presentation.
`;

  return baseSlides;
}

function render(text) {
  const lines = text.split("\n");
  let html = "";
  let title = "";

  lines.forEach(l => {
    if (l.includes("SLIDE 1")) {
      title = l;
    }
    if (l.trim()) {
      html += `<div class="slide">${l}</div>`;
    }
  });

  document.getElementById("output").innerHTML =
    html + `<div class="title">${title}</div>`;
}

function save(topic, result) {
  history.unshift({ topic, result });
  if (history.length > 10) history.pop();

  const box = document.getElementById("history");
  box.innerHTML = "";

  history.forEach(h => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerText = "🎤 " + h.topic;
    div.onclick = () => render(h.result);
    box.appendChild(div);
  });
}

function clearAll() {
  document.getElementById("topic").value = "";
  document.getElementById("output").innerText = "";
}
</script>

</body>
</html>
