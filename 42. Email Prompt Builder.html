<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Prompt Builder</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #e8e8f8;
  padding: 40px 20px;
  color: #2d2d5e;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.badge {
  display: inline-block;
  background: #7c3aed;
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 34px;
  color: #5b21b6;
  font-weight: 800;
}

.info {
  margin-top: 8px;
  font-size: 13px;
  color: #4b5563;
}

/* CARD */
.card {
  background: white;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 22px;
  max-width: 900px;
  margin: 0 auto 18px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #7c3aed;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* INPUTS */
input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid #ddd8f5;
  background: #fafafa;
  font-family: monospace;
}

/* BUTTONS */
.btn {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: #5b21b6;
  color: white;
}

.secondary {
  background: transparent;
  border: 1.5px solid #c4b5fd;
  color: #5b21b6;
}

/* OUTPUT */
.output {
  background: #fff;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 18px;
  min-height: 260px;
  white-space: pre-wrap;
}

.block {
  background: #f5f3ff;
  border-left: 4px solid #7c3aed;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.title {
  background: #ede9fe;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  font-weight: 700;
}

/* HISTORY */
.history-item {
  background: #f5f3ff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="badge">📧 Email Builder</div>
  <h1>Email Prompt Generator</h1>

  <div class="info">
      Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
  </div>
</div>

<!-- INPUTS -->
<div class="card">
  <div class="section-label">Recipient Name</div>
  <input id="to" placeholder="e.g. Mr. Ahmed / Manager / Teacher"/>
</div>

<div class="card">
  <div class="section-label">Email Subject</div>
  <input id="subject" placeholder="e.g. Meeting Request / Leave Application"/>
</div>

<div class="card">
  <div class="section-label">Email Purpose</div>
  <textarea id="purpose" rows="3"
  placeholder="e.g. Request for meeting regarding project discussion"></textarea>
</div>

<div class="card">
  <div class="section-label">Tone</div>
  <select id="tone">
    <option>Formal</option>
    <option>Professional</option>
    <option>Friendly</option>
  </select>
</div>

<!-- BUTTONS -->
<div class="card">
  <button class="btn primary" onclick="generate()">Generate Email</button>
  <button class="btn secondary" onclick="clearAll()">Clear</button>
</div>

<!-- OUTPUT -->
<div class="card">
  <div class="section-label">Generated Email</div>
  <div class="output" id="output">
    Your email will appear here...
  </div>
</div>

<!-- HISTORY -->
<div class="card">
  <div class="section-label">History</div>
  <div id="history"></div>
</div>

<script>
let history = [];

function generate() {
  const to = document.getElementById("to").value;
  const subject = document.getElementById("subject").value;
  const purpose = document.getElementById("purpose").value;
  const tone = document.getElementById("tone").value;

  if (!to || !subject) return alert("Enter recipient and subject!");

  const email = buildEmail(to, subject, purpose, tone);

  render(email);
  save(subject, email);
}

function buildEmail(to, subject, purpose, tone) {

  let greeting = "Dear " + to + ",";
  let bodyStyle = "";

  if (tone === "Formal") {
    bodyStyle = "I hope this email finds you well.";
  } else if (tone === "Professional") {
    bodyStyle = "I am writing to formally inform you regarding the matter below.";
  } else {
    bodyStyle = "I hope you're doing great!";
  }

  return `
EMAIL

------------------------------------
SUBJECT: ${subject}

------------------------------------
${greeting}

${bodyStyle}

------------------------------------
BODY
------------------------------------
${purpose || "Please provide details regarding your request."}

------------------------------------
CLOSING
------------------------------------
Thank you for your time and consideration.

Best Regards,
Hamna Munir
`;
}

function render(text) {
  const lines = text.split("\n");
  let html = "";
  let title = "";

  lines.forEach(l => {
    if (l.includes("EMAIL")) {
      title = l;
    }
    if (l.trim()) {
      html += `<div class="block">${l}</div>`;
    }
  });

  document.getElementById("output").innerHTML =
    html + `<div class="title">${title}</div>`;
}

function save(subject, result) {
  history.unshift({ subject, result });
  if (history.length > 10) history.pop();

  const box = document.getElementById("history");
  box.innerHTML = "";

  history.forEach(h => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerText = "📧 " + h.subject;
    div.onclick = () => render(h.result);
    box.appendChild(div);
  });
}

function clearAll() {
  document.getElementById("to").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("purpose").value = "";
  document.getElementById("output").innerText = "";
}
</script>

</body>
</html>
