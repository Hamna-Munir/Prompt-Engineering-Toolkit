<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blog Prompt Builder</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #e8e8f8;
  padding: 40px 20px;
  color: #2d2d5e;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.badge {
  display: inline-block;
  background: #7c3aed;
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 34px;
  color: #5b21b6;
  font-weight: 800;
}

.info {
  margin-top: 8px;
  font-size: 13px;
  color: #4b5563;
}

/* CARD */
.card {
  background: white;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 22px;
  max-width: 900px;
  margin: 0 auto 18px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #7c3aed;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* INPUTS */
input, textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid #ddd8f5;
  background: #fafafa;
  font-family: monospace;
}

/* BUTTONS */
.btn {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: #5b21b6;
  color: white;
}

.secondary {
  background: transparent;
  border: 1.5px solid #c4b5fd;
  color: #5b21b6;
}

/* OUTPUT */
.output {
  background: #fff;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 18px;
  min-height: 320px;
  white-space: pre-wrap;
}

.block {
  background: #f5f3ff;
  border-left: 4px solid #7c3aed;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.title {
  background: #ede9fe;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  font-weight: 700;
}

/* HISTORY */
.history-item {
  background: #f5f3ff;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  font-size: 13px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="badge">📝 Blog Builder</div>
  <h1>Blog Prompt Generator</h1>

  <div class="info">
  Developed by <span>Hamna Munir</span> | <span>Mirza Yasir Abdullah Baig</span>
  </div>
</div>

<!-- INPUTS -->
<div class="card">
  <div class="section-label">Blog Topic</div>
  <input id="topic" placeholder="e.g. Importance of Education / AI in Future"/>
</div>

<div class="card">
  <div class="section-label">Blog Type</div>
  <select id="type">
    <option>SEO Blog</option>
    <option>Story Blog</option>
    <option>Educational Blog</option>
    <option>Opinion Blog</option>
  </select>
</div>

<div class="card">
  <div class="section-label">Tone</div>
  <select id="tone">
    <option>Professional</option>
    <option>Casual</option>
    <option>Storytelling</option>
    <option>SEO Optimized</option>
  </select>
</div>

<!-- BUTTONS -->
<div class="card">
  <button class="btn primary" onclick="generate()">Generate Blog</button>
  <button class="btn secondary" onclick="clearAll()">Clear</button>
</div>

<!-- OUTPUT -->
<div class="card">
  <div class="section-label">Generated Blog</div>
  <div class="output" id="output">
    Your blog will appear here...
  </div>
</div>

<!-- HISTORY -->
<div class="card">
  <div class="section-label">History</div>
  <div id="history"></div>
</div>

<script>
let history = [];

function generate() {
  const topic = document.getElementById("topic").value;
  const type = document.getElementById("type").value;
  const tone = document.getElementById("tone").value;

  if (!topic) return alert("Enter a topic!");

  const result = buildBlog(topic, type, tone);

  render(result);
  save(topic, result);
}

function buildBlog(topic, type, tone) {

  let blog = "";

  if (type === "SEO Blog") {
    blog = `
INTRODUCTION:
Welcome to this SEO-optimized blog on ${topic}.

BODY:
${topic} is an important subject in today’s world. It helps improve knowledge and awareness.

KEY POINTS:
- Importance of ${topic}
- Benefits of ${topic}
- Future impact

CONCLUSION:
In conclusion, ${topic} plays a vital role in development.
`;
  }

  if (type === "Story Blog") {
    blog = `
STORY INTRO:
Once upon a time, there was a situation related to ${topic}...

STORY BODY:
The journey around ${topic} taught many lessons.

LESSON:
Always understand the value of ${topic}.
`;
  }

  if (type === "Educational Blog") {
    blog = `
INTRODUCTION:
This blog explains ${topic} in an easy way.

EXPLANATION:
${topic} is studied widely in education and real life.

EXAMPLES:
- Real world usage
- Practical importance

CONCLUSION:
Learning ${topic} helps improve skills and knowledge.
`;
  }

  if (type === "Opinion Blog") {
    blog = `
MY OPINION:
I believe ${topic} is extremely important in modern times.

REASONING:
It impacts society, education, and technology.

FINAL THOUGHT:
We should focus more on ${topic}.
`;
  }

  return `
BLOG CONTENT

----------------------------------
TOPIC: ${topic}
TYPE: ${type}
TONE: ${tone}

----------------------------------
BLOG STRUCTURE
----------------------------------
TITLE: ${topic} - Complete Guide

${blog}

----------------------------------
SEO KEYWORDS
----------------------------------
#${topic.replace(/\s/g,'')} #blog #seo #education #knowledge #writing
`;
}

function render(text) {
  const lines = text.split("\n");
  let html = "";
  let title = "";

  lines.forEach(l => {
    if (l.includes("BLOG")) title = l;
    if (l.trim()) html += `<div class="block">${l}</div>`;
  });

  document.getElementById("output").innerHTML =
    html + `<div class="title">${title}</div>`;
}

function save(topic, result) {
  history.unshift({ topic, result });
  if (history.length > 10) history.pop();

  const box = document.getElementById("history");
  box.innerHTML = "";

  history.forEach(h => {
    const div = document.createElement("div");
    div.className = "history-item";
    div.innerText = "📝 " + h.topic;
    div.onclick = () => render(h.result);
    box.appendChild(div);
  });
}

function clearAll() {
  document.getElementById("topic").value = "";
  document.getElementById("output").innerText = "";
}
</script>

</body>
</html>
