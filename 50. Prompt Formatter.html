<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prompt Formatter</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #e8e8f8;
  padding: 40px 20px;
  color: #2d2d5e;
}

/* HEADER */
.header {
  text-align: center;
  margin-bottom: 20px;
}

.badge {
  display: inline-block;
  background: #7c3aed;
  color: white;
  padding: 6px 16px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 34px;
  color: #5b21b6;
  font-weight: 800;
}

.info {
  margin-top: 8px;
  font-size: 13px;
  color: #4b5563;
}

/* CARD */
.card {
  background: white;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 22px;
  max-width: 900px;
  margin: 0 auto 18px;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: #7c3aed;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

/* INPUT */
textarea, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1.5px solid #ddd8f5;
  background: #fafafa;
  font-family: monospace;
}

/* BUTTON */
.btn {
  padding: 12px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary {
  background: #5b21b6;
  color: white;
}

.secondary {
  background: transparent;
  border: 1.5px solid #c4b5fd;
  color: #5b21b6;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* OUTPUT */
.output {
  background: #fff;
  border: 1.5px solid #e0dff5;
  border-radius: 16px;
  padding: 18px;
  min-height: 260px;
  white-space: pre-wrap;
}

.block {
  background: #f5f3ff;
  border-left: 4px solid #7c3aed;
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 8px;
}

.title {
  background: #ede9fe;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  font-weight: 700;
}

.score {
  font-size: 18px;
  font-weight: 800;
  color: #5b21b6;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="badge">🧩 Prompt Formatter</div>
  <h1>Prompt Formatter Tool</h1>

  <div class="info">
    👩‍🎓 Student: <b>Hamna Munir</b> | 👨‍🏫 Teacher: <b>Sir Nadeem</b>
  </div>
</div>

<!-- INPUT -->
<div class="card">
  <div class="section-label">Enter Raw Prompt</div>
  <textarea id="input" rows="4" placeholder="e.g. explain ai in simple words"></textarea>
</div>

<div class="card">
  <div class="section-label">Format Style</div>
  <select id="style">
    <option>Basic Format</option>
    <option>Professional Format</option>
    <option>Expert Format</option>
    <option>API Style Format</option>
  </select>
</div>

<!-- BUTTON -->
<div class="card">
  <button class="btn primary" onclick="formatPrompt()">Format Prompt</button>
  <button class="btn secondary" onclick="clearAll()">Clear</button>
</div>

<!-- OUTPUT -->
<div class="card grid">
  <div>
    <div class="section-label">Before</div>
    <div class="output" id="before">Raw prompt...</div>
  </div>

  <div>
    <div class="section-label">After (Formatted Prompt)</div>
    <div class="output" id="after">Formatted prompt...</div>
  </div>
</div>

<!-- SCORE -->
<div class="card">
  <div class="section-label">Formatting Quality Score</div>
  <div class="score" id="score">0%</div>
</div>

<script>

function formatPrompt() {
  const input = document.getElementById("input").value;
  const style = document.getElementById("style").value;

  if (!input) return alert("Enter a prompt!");

  document.getElementById("before").innerText = input;

  const formatted = buildFormat(input, style);

  document.getElementById("after").innerText = formatted;

  const score = calcScore(input, style);
  document.getElementById("score").innerText = score + "%";
}

function buildFormat(text, style) {

  let clean = text.trim();

  let result = "";

  if (style === "Basic Format") {
    result = `
ROLE: AI Assistant
TASK: ${clean}
INSTRUCTION: Provide a clear answer.
OUTPUT: Simple explanation
`;
  }

  if (style === "Professional Format") {
    result = `
ROLE: Professional AI Assistant

TASK: ${clean}

CONTEXT:
Provide structured and accurate information.

INSTRUCTION:
- Be clear
- Be concise
- Avoid unnecessary details

OUTPUT FORMAT:
- Introduction
- Explanation
- Summary
`;
  }

  if (style === "Expert Format") {
    result = `
ROLE: Senior Domain Expert AI

TASK: ${clean}

CONTEXT:
Deep, detailed, and professional-level explanation required.

INSTRUCTION:
- Include examples
- Include real-world use cases
- Mention limitations

OUTPUT FORMAT:
1. Overview
2. Deep Explanation
3. Examples
4. Applications
5. Conclusion
`;
  }

  if (style === "API Style Format") {
    result = `
{
  "role": "AI Assistant",
  "task": "${clean}",
  "instructions": {
    "clarity": true,
    "detail_level": "high",
    "format": "structured"
  },
  "output_format": [
    "sectioned_response",
    "bullet_points",
    "summary"
  ]
}
`;
  }

  return result;
}

function calcScore(text, style) {
  let score = text.length;

  if (style === "Basic Format") score += 20;
  if (style === "Professional Format") score += 40;
  if (style === "Expert Format") score += 60;
  if (style === "API Style Format") score += 70;

  return Math.min(score, 100);
}

function clearAll() {
  document.getElementById("input").value = "";
  document.getElementById("before").innerText = "";
  document.getElementById("after").innerText = "";
  document.getElementById("score").innerText = "0%";
}

</script>

</body>
</html>
